<text x="820" y="306" fill="#d7f7ef" font-size="15" font-weight="700">상태를 노출하며, 위치 권한 거부 시 주소 목록 fallback을 제공하세요.</text>
<text x="820" y="326" fill="#d7f7ef" font-size="15" font-weight="700">예약 CTA는 요금/도착 예상 정보와 함께 시트 안에 유지합니다.</text>
