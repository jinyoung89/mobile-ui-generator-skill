  <text x="80" y="180" fill="#cbd6ec" font-size="16" font-weight="650">지도, 경로 선택, 위치 권한 fallback, 바텀시트 결제 CTA가 있는 차량 예약 화면을 설계해줘.</text>
  <text x="760" y="96" fill="#9fb0d0" font-size="13" font-weight="850" letter-spacing="1.6">산출물 프리뷰</text>
