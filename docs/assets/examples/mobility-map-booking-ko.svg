    <text x="440" y="286" fill="#dbe7ff" font-size="17" font-weight="700">지도 맥락을 잃지 않고 경로를 선택해 예약하도록 돕습니다.</text><text x="440" y="360" fill="#9fb0d0" font-size="15" font-weight="650">시트는 collapsed/half/full 상태를 가지며, 권한 거부 시 주소 검색과</text>
<text x="440" y="380" fill="#9fb0d0" font-size="15" font-weight="650">최근 장소 목록으로 전환합니다.</text>
