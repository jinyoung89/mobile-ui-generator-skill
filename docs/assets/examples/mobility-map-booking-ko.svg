<text x="774" y="134" fill="#effff8" font-size="12" font-weight="850" letter-spacing="0.4">screen brief</text>
<rect x="882" y="114" width="92" height="30" rx="15" fill="#8ec5ff" opacity="0.16" stroke="#8ec5ff" stroke-opacity="0.38"/>
