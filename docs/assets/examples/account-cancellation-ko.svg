<text x="998" y="561" fill="#ffffff" font-size="14" font-weight="900" text-anchor="middle">Confirm</text></g>
  <text x="880" y="116" fill="#ef4444" font-size="13" font-weight="900" letter-spacing="1.8">상태 대응 예시</text>
  <text x="880" y="144" fill="#dbeafe" font-size="18" font-weight="800">스킬은 상태 변화까지 설계합니다.</text>
