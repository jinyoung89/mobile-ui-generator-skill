<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">위험 고지가 있는 회원 탈퇴 prompt to generated mobile UI preview</title>
  <desc id="desc">Visual mobile UI/UX result generated from a user prompt by the Mobile UI Generator skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#050814"/><stop offset=".55" stop-color="#0f172a"/><stop offset="1" stop-color="#11202b"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".32"/></filter>
    <style>text{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Noto Sans KR','Segoe UI',sans-serif} .card{filter:url(#shadow)}</style>
  </defs>
  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>
  <circle cx="1080" cy="80" r="150" fill="#ef4444" opacity=".16"/>
  <circle cx="650" cy="690" r="190" fill="#ef4444" opacity=".10"/>
  <rect x="48" y="58" width="360" height="644" rx="30" fill="#111827" stroke="#ffffff" stroke-width="1"/>
