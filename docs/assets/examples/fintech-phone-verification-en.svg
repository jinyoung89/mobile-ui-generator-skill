<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Korean fintech phone verification skill output preview</title>
  <desc id="desc">Generated visual preview from the Mobile UI Generator skill output data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070a12"/><stop offset=".58" stop-color="#101827"/><stop offset="1" stop-color="#0b1f28"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#80ffdb" stop-opacity=".22"/><stop offset="1" stop-color="#5390d9" stop-opacity=".12"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".30"/></filter>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Noto Sans KR','Segoe UI',sans-serif}
      .pulse{animation:pulse 2.8s ease-in-out infinite; transform-origin:center}
      @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
      @media (prefers-reduced-motion: reduce){.pulse{animation:none}}
    </style>
