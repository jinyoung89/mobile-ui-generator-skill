  <text x="80" y="180" fill="#cbd6ec" font-size="16" font-weight="650">Design a Korean fintech signup phone verification screen with required terms,</text>
<text x="80" y="200" fill="#cbd6ec" font-size="16" font-weight="650">resend timer, error states, and a safe fixed CTA.</text>
