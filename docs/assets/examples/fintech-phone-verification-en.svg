<text x="440" y="308" fill="#dbe7ff" font-size="17" font-weight="700">preserving trust and compliance clarity.</text><text x="440" y="360" fill="#9fb0d0" font-size="15" font-weight="650">CTA stays disabled until required terms are</text>
<text x="440" y="380" fill="#9fb0d0" font-size="15" font-weight="650">checked and a six-digit code is valid; resend…</text>
