<text x="460" y="500" fill="#d6e4fb" font-size="15" font-weight="650">쿠폰 사용 불가</text>
<circle cx="442" cy="529" r="4" fill="#80ffdb"/>
<text x="460" y="534" fill="#d6e4fb" font-size="15" font-weight="650">포인트 한도 초과</text>
