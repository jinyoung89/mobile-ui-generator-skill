<circle cx="82" cy="597" r="4" fill="#ffd166"/>
<text x="100" y="602" fill="#d6e4fb" font-size="15" font-weight="650">포인트 입력</text>
<circle cx="82" cy="631" r="4" fill="#ffd166"/>
<text x="100" y="636" fill="#d6e4fb" font-size="15" font-weight="650">가격 breakdown</text>
<circle cx="82" cy="665" r="4" fill="#ffd166"/>
<text x="100" y="670" fill="#d6e4fb" font-size="15" font-weight="650">결제수단 행</text>
