<text x="460" y="568" fill="#d6e4fb" font-size="15" font-weight="650">배송지 없음</text>
<circle cx="442" cy="597" r="4" fill="#80ffdb"/>
<text x="460" y="602" fill="#d6e4fb" font-size="15" font-weight="650">결제 진행 중</text>
<circle cx="442" cy="631" r="4" fill="#80ffdb"/>
<text x="460" y="636" fill="#d6e4fb" font-size="15" font-weight="650">결제 실패</text>
<circle cx="442" cy="665" r="4" fill="#80ffdb"/>
<text x="460" y="670" fill="#d6e4fb" font-size="15" font-weight="650">주문 성공</text>
