    <text x="80" y="286" fill="#8fa1c3" font-size="12" font-weight="800">app_type</text>
<text x="192" y="286" fill="#ffffff" font-size="15" font-weight="850">커머스 / 마켓플레이스</text>
<text x="80" y="334" fill="#8fa1c3" font-size="12" font-weight="800">ui_patterns</text>
<text x="192" y="334" fill="#ffffff" font-size="15" font-weight="850">cart, checkout, coupon_points,</text>
