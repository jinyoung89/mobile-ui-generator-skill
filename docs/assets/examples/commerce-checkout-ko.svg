    <text x="798" y="480" fill="#80ffdb" font-size="13" font-weight="900" letter-spacing="1.8">JSON SPEC</text>
    <text x="800" y="500" fill="#8fa1c3" font-size="12" font-weight="800">screen_id</text>
<text x="906" y="500" fill="#ffffff" font-size="15" font-weight="850">checkout_review</text>
<text x="800" y="548" fill="#8fa1c3" font-size="12" font-weight="800">navigation</text>
<text x="906" y="548" fill="#ffffff" font-size="15" font-weight="850">top_app_bar + sticky_amount_cta</text>
<text x="800" y="596" fill="#8fa1c3" font-size="12" font-weight="800">primary_cta</text>
<text x="906" y="596" fill="#ffffff" font-size="15" font-weight="850">68,400원 결제하기</text>
<text x="800" y="644" fill="#8fa1c3" font-size="12" font-weight="800">language</text>
<text x="906" y="644" fill="#ffffff" font-size="15" font-weight="850">ko</text>
