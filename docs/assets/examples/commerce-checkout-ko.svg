    <rect x="416" y="232" width="360" height="188" rx="22" fill="#171d2b" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="438" y="266" fill="#ffd166" font-size="13" font-weight="900" letter-spacing="1.8">BRIEF EXCERPT</text>
    <text x="440" y="286" fill="#dbe7ff" font-size="17" font-weight="700">가격 확신과 회복 경로를 명확히 보여주며 구매 결정을 돕습니다.</text><text x="440" y="360" fill="#9fb0d0" font-size="15" font-weight="650">쿠폰·포인트 변경 시 즉시 금액을 재계산하고, 결제 로딩 중에는 중복 탭을 막되 맥락은</text>
<text x="440" y="380" fill="#9fb0d0" font-size="15" font-weight="650">유지합니다.</text>
  </g>
  <g class="panel">
