<text x="820" y="306" fill="#d7f7ef" font-size="15" font-weight="700">배송, 결제수단 섹션을 분리하고, 하단 고정 CTA에는 최종 금액을</text>
<text x="820" y="326" fill="#d7f7ef" font-size="15" font-weight="700">포함하세요. 로딩/실패/성공 상태에서도 가격 breakdown을 숨기지</text>
<text x="820" y="346" fill="#d7f7ef" font-size="15" font-weight="700">마세요.</text>
