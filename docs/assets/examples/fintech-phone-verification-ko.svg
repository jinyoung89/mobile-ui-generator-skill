    <rect x="416" y="232" width="360" height="188" rx="22" fill="#171d2b" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="438" y="266" fill="#80ffdb" font-size="13" font-weight="900" letter-spacing="1.8">BRIEF EXCERPT</text>
    <text x="440" y="286" fill="#dbe7ff" font-size="17" font-weight="700">신뢰와 고지 명확성을 유지하면서 최소 마찰로 본인인증을 완료합니다.</text><text x="440" y="360" fill="#9fb0d0" font-size="15" font-weight="650">필수 약관 동의와 6자리 코드 유효성이 충족될 때만 CTA를 활성화하고, 재전송은</text>
<text x="440" y="380" fill="#9fb0d0" font-size="15" font-weight="650">타이머 만료 후 노출합니다.</text>
