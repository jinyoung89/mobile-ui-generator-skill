<text x="460" y="636" fill="#d6e4fb" font-size="15" font-weight="650">재전송 가능</text>
<circle cx="442" cy="665" r="4" fill="#5390d9"/>
<text x="460" y="670" fill="#d6e4fb" font-size="15" font-weight="650">시도 횟수 초과</text>
