<text x="820" y="306" fill="#d7f7ef" font-size="15" font-weight="700">단일 작업 흐름, safe-area 하단 고정 CTA, CTA 활성/비활성</text>
<text x="820" y="326" fill="#d7f7ef" font-size="15" font-weight="700">상태, 타이머/재전송 동작, 인라인 오류 문구를 유지하고 폼과 경쟁하는 장식</text>
<text x="820" y="346" fill="#d7f7ef" font-size="15" font-weight="700">배너는 넣지 마세요.</text>
