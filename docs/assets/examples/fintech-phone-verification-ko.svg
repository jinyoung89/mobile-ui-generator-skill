<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">한국 핀테크 휴대폰 본인인증 skill output preview</title>
  <desc id="desc">Generated visual preview from the Mobile UI Generator skill output data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070a12"/><stop offset=".58" stop-color="#101827"/><stop offset="1" stop-color="#0b1f28"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#80ffdb" stop-opacity=".22"/><stop offset="1" stop-color="#5390d9" stop-opacity=".12"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".30"/></filter>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Noto Sans KR','Segoe UI',sans-serif}
      .pulse{animation:pulse 2.8s ease-in-out infinite; transform-origin:center}
      @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
      @media (prefers-reduced-motion: reduce){.pulse{animation:none}}
    </style>
  </defs>
  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>
  <rect x="32" y="32" width="1136" height="696" rx="36" fill="#101622" stroke="#fff" stroke-opacity=".08" filter="url(#shadow)"/>
  <rect x="56" y="56" width="1088" height="144" rx="28" fill="url(#header)" stroke="#80ffdb" stroke-opacity=".24"/>
  <circle class="pulse" cx="88" cy="89" r="7" fill="#80ffdb"/>
  <text x="106" y="94" fill="#80ffdb" font-size="14" font-weight="900" letter-spacing="2.1">생성 스킬 산출물</text>
  <text x="80" y="140" fill="#fff" font-size="32" font-weight="900">한국 핀테크 휴대폰 본인인증</text>
  <text x="80" y="180" fill="#cbd6ec" font-size="16" font-weight="650">한국 핀테크 회원가입용 휴대폰 본인인증 화면을 설계해줘. 필수 약관, 재전송 타이머, 오류 상태, 안전한 고정 CTA가 필요해.</text>
  <text x="760" y="96" fill="#9fb0d0" font-size="13" font-weight="850" letter-spacing="1.6">산출물 프리뷰</text>
  <rect x="760" y="114" width="112" height="30" rx="15" fill="#80ffdb" opacity="0.16" stroke="#80ffdb" stroke-opacity="0.38"/>
<text x="774" y="134" fill="#effff8" font-size="12" font-weight="850" letter-spacing="0.4">screen brief</text>
<rect x="882" y="114" width="92" height="30" rx="15" fill="#80ffdb" opacity="0.16" stroke="#80ffdb" stroke-opacity="0.38"/>
<text x="896" y="134" fill="#effff8" font-size="12" font-weight="850" letter-spacing="0.4">JSON spec</text>
