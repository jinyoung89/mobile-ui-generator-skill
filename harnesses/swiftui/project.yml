# Source contract for the pinned public SwiftUI harness.
# Xcode 15.2 / Swift 5.9.2 / iOS 17.2 (native build and capture are release-audit work).
name: MobileUIShowcase
options:
  bundleIdPrefix: com.jinyoung
  deploymentTarget:
    iOS: "17.2"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.2"
    DEVELOPMENT_TEAM: ""
targets:
  MobileUIShowcase:
    type: application
    platform: iOS
    product: MobileUIShowcase
    bundleId: com.jinyoung.mobileuishowcase.swiftui
    sources:
      - path: Sources
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
  MobileUIShowcaseTests:
    type: bundle.unit-test
    platform: iOS
    product: MobileUIShowcaseTests
    bundleId: com.jinyoung.mobileuishowcase.swiftui.tests
    sources:
      - path: Tests
    dependencies:
      - target: MobileUIShowcase

