<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>휴대폰 번호로 시작할게요</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="mobile-screen archetype-form" data-example-id="fintech-signup" data-state="default">
    <header class="screen-header"><div><p class="eyebrow">finance-fintech</p><h1 data-i18n="title">휴대폰 번호로 시작할게요</h1><p data-i18n="subtitle">본인 명의 번호를 확인하면 안전하게 계정을 만들 수 있어요.</p></div><button class="locale-button" type="button" data-locale aria-label="English">EN</button></header>
    <section class="screen-content" aria-live="polite"><label class="field"><span>휴대폰 번호</span><input data-local-input inputmode="tel" aria-label="휴대폰 번호"></label><label class="field"><span>인증번호 6자리</span><input data-local-input inputmode="numeric" aria-label="인증번호 6자리"></label><aside class="notice" role="note"><strong>필수 약관과 본인 확인 내용에 동의합니다</strong><p>계좌 개설 전 이름과 휴대폰 명의가 일치하는지 확인하세요. 실제 인증이나 계좌 개설은 실행하지 않습니다.</p></aside></section>
    <footer class="fixed-action"><button class="primary-action" type="button" data-primary-action data-i18n="primary_cta">확인하고 계속</button><p class="status-text" data-status>정적 로컬 예시</p></footer>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
