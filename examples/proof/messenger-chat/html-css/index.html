<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title data-i18n="title">민서</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="mobile-screen archetype-chat" data-example-id="messenger-chat" data-state="default">
    <header class="screen-header"><div><p class="eyebrow" data-i18n="item_badge">온라인</p><h1 data-i18n="title">민서</h1><p data-i18n="subtitle">온라인 · 알림 켜짐</p></div><button class="locale-button" type="button" data-locale aria-label="언어 전환" data-i18n-aria="switch_language_label">EN</button></header>
    <section class="state-panel" data-state-panel hidden><h2 data-state-title></h2><p data-state-body></p><button type="button" data-recover hidden></button></section>
    <section class="screen-content" aria-live="polite"><section class="message-list" aria-label="최근 대화" data-i18n-aria="secondary_label"><div class="bubble incoming" data-i18n="message_in">오늘 공유한 화면, 320px에서도 정렬 괜찮았어?</div><div class="bubble outgoing" data-i18n="message_out">응, 긴 한국어 문장까지 줄바꿈 확인했어.</div><small data-i18n="item_meta">오후 3:24 · 읽음</small></section><label class="composer"><span class="sr-only" data-i18n="field_label">메시지 입력</span><input data-local-input aria-label="메시지 입력" data-i18n-aria="field_label"><button type="button" data-secondary-action aria-label="메시지 보내기" data-i18n-aria="primary_cta">↑</button></label><span class="source-id" aria-hidden="true">messenger-chat</span></section>
    <footer class="fixed-action"><button class="primary-action" type="button" data-primary-action data-i18n="primary_cta">메시지 보내기</button><p class="status-text" data-status data-i18n="ready_label">정적 로컬 예시</p></footer>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
