<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>민서</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="mobile-screen archetype-chat" data-example-id="messenger-chat" data-state="default">
    <header class="screen-header"><div><p class="eyebrow">messaging</p><h1 data-i18n="title">민서</h1><p data-i18n="subtitle">온라인 · 알림 켜짐</p></div><button class="locale-button" type="button" data-locale aria-label="English">EN</button></header>
    <section class="screen-content" aria-live="polite"><section class="message-list" aria-label="최근 대화"><div class="bubble incoming">오늘 공유한 화면, 320px에서도 정렬 괜찮았어?</div><div class="bubble outgoing">응, 긴 한국어 문장까지 줄바꿈 확인했어.</div><small>오후 3:24 · 읽음</small></section><label class="composer"><span class="sr-only">메시지 입력</span><input data-local-input aria-label="메시지 입력"><button type="button" data-secondary-action>↑</button></label><span class="source-id" aria-hidden="true">messenger-chat</span></section>
    <footer class="fixed-action"><button class="primary-action" type="button" data-primary-action data-i18n="primary_cta">메시지 보내기</button><p class="status-text" data-status>정적 로컬 예시</p></footer>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
